nodeLinker: node-modules

enableScripts: true

npmMinimalAgeGate: 0

# @wardnet packages publish to (and, for first-party consumers, resolve from)
# GitHub Packages. The DS keeps the @wardnet scope on GitHub Packages; the
# public SDK is dual-published there too, so first-party repos point @wardnet at
# this registry and get both, while external SDK users fetch it from npmjs.
# Auth token comes from the environment (NODE_AUTH_TOKEN = GITHUB_TOKEN in CI);
# empty locally, which is fine for install/build — only publish needs it.
npmScopes:
  wardnet:
    npmRegistryServer: "https://npm.pkg.github.com"
    npmPublishRegistry: "https://npm.pkg.github.com"
    npmAuthToken: "${NODE_AUTH_TOKEN-}"
